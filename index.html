<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>

</head>

<body>
    <header> Counter </header>
    <main id="counter">
        10

    </main>
    <footer>
        <button class="decrease" onclick="decreaseCount()">Decrease 1</button>
        <button class="increase" onClick="increaseCount()">Increase 1</button>
        <button class="reset" onClick="resetCounter()">Reset</button>
        <button class="save" onClick="saveCounter()">Save</button>
        <button class="load" onClick="loadCounter()">Load</button>

    </footer>
    <script src="./script.js"></script>

</body>

</html>
